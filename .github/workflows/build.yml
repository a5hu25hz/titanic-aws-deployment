name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies and test
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest httpx
        python -m pytest tests/

    - name: Build the Docker image
      run: |
        docker build -t titanic-predictor-api:latest .
        docker images

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag and push image to Amazon ECR
      env:
        ECR_REGISTRY: 421371244642.dkr.ecr.eu-north-1.amazonaws.com
        ECR_REPOSITORY: titanic-predictor-api
        IMAGE_TAG: latest
      run: |
        docker tag titanic-predictor-api:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG